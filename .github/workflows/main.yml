name: Build Mod Menu APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Memungkinkan kamu menjalankan build manual klik tombol

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Penting untuk menarik library Dobby/KittyMemory

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Native Libraries (.so)
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-SO-Files
          path: app/build/intermediates/cmake/debug/obj/**/*.so
          
