name: Build ARM64 .so

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Gunakan v4 agar tidak dideprecated
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # Daripada pakai clang++ manual yang ribet ngatur include-nya, 
      # lebih baik biarkan Gradle yang urus build .so nya saja.
      - name: Compile Native Libraries
        run: ./gradlew assembleDebug

      - name: Create output dir
        run: mkdir -p output

      # Mengambil file .so hasil compile dari folder build Gradle
      - name: Copy Compiled .so
        run: |
          cp app/build/intermediates/cmake/debug/obj/arm64-v8a/libMyModName.so output/mod.so || cp app/build/intermediates/cmake/debug/obj/arm64-v8a/*.so output/mod.so

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixelworld-mod
          path: output/mod.so
          
