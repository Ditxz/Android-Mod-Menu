name: Build ARM64 .so

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Create output dir
        run: mkdir -p output

      - name: Compile ARM64 .so
        run: |
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android29-clang++ \
            -shared -fPIC \
            -o output/mod.so \
            src/main.cpp \
            -llog

      - name: Upload .so artifact
        uses: actions/upload-artifact@v3
        with:
          name: pixelworld-mod
          path: output/mod.so
